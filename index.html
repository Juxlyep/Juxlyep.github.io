<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Juxlyep</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --link: #0645ad; --border: #a2a9b1; --bg: #f6f6f6; }
        body { margin: 0; font-family: sans-serif; font-size: 14px; background: var(--bg); display: flex; }
        nav { width: 160px; padding: 15px; }
        .logo { font-family: serif; font-size: 26px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        nav ul { list-style: none; padding: 0; border-top: 1px solid var(--border); }
        nav a { text-decoration: none; color: var(--link); font-size: 12px; cursor: pointer; }
        .main-wrapper { flex-grow: 1; background: white; border-left: 1px solid var(--border); min-height: 100vh; padding: 20px 40px; }
        h1 { font-family: serif; font-size: 1.8rem; border-bottom: 1px solid var(--border); font-weight: normal; }
        .infobox { float: right; width: 260px; border: 1px solid var(--border); background: #f8f9fa; margin-left: 20px; font-size: 12px; }
        .infobox th { background: #cedff2; border: 1px solid var(--border); padding: 5px; text-align: left; }
        .infobox td { border: 1px solid var(--border); padding: 5px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Juxlyep</div>
    <ul>
        <li><a href="#メインページ">メインページ</a></li>
    </ul>
</nav>

<div class="main-wrapper">
    <h1 id="page-title">メインページ</h1>
    <div id="page-body">読み込み中...</div>
</div>

<script>
    // キーから逆算した確定URL
    const S_URL = 'https://fuubwstlnpdxsjywxcqx.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1dWJ3c3RsbmRwZHhzanl3eGNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzEwMzEsImV4cCI6MjA5NDMwNzAzMX0.47ck77pxTUzU4jvkMF8wiaxw-CRSRGEsB0ZC1w18dzs';
    
    const sbClient = window.supabase.createClient(S_URL, S_KEY);

    async function loadArticle() {
        const title = decodeURIComponent(location.hash.replace('#', '')) || 'メインページ';
        document.getElementById('page-title').textContent = title;
        const bodyEl = document.getElementById('page-body');

        const { data, error } = await sbClient
            .from('articles')
            .select('*')
            .eq('title', title)
            .single();

        if (error || !data) {
            bodyEl.innerHTML = `<p>記事「${title}」は見つかりませんでした。</p>`;
            return;
        }

        let infoHtml = '';
        if (data.infobox_data) {
            infoHtml = `<div class="infobox"><table>${Object.entries(data.infobox_data).map(([k, v]) => `<tr><th>${k}</th><td>${v}</td></tr>`).join('')}</table></div>`;
        }

        let sectionsHtml = (data.sections || []).map(s => `<h2>${s.heading}</h2><p>${s.content}</p>`).join('');
        bodyEl.innerHTML = `${infoHtml}<p><b>${data.title}</b>は、${data.summary}</p>${sectionsHtml}`;
    }

    window.addEventListener('hashchange', loadArticle);
    loadArticle();
</script>

</body>
</html>
