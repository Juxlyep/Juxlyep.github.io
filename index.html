<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Simple Wiki</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1 id="page-title">読み込み中...</h1>
    <div id="display-area">
        <p id="page-content"></p>
        <button onclick="toggleEdit(true)">編集する</button>
    </div>

    <div id="edit-area" style="display:none;">
        <input type="text" id="edit-title" style="width: 100%;"><br>
        <textarea id="edit-content" rows="10" style="width: 100%;"></textarea><br>
        <button onclick="savePage()">保存</button>
        <button onclick="toggleEdit(false)">キャンセル</button>
    </div>

    <script>
        const S_URL = 'https://fuubwstlnpdxsjywxcqx.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // 提供されたキー
        const sb = supabase.createClient(S_URL, S_KEY);

        const slug = 'home'; // 今回は固定

        // データの取得
        async function loadPage() {
            const { data, error } = await sb
                .from('wiki_pages')
                .select('*')
                .eq('slug', slug)
                .single();

            if (data) {
                document.getElementById('page-title').innerText = data.title;
                document.getElementById('page-content').innerText = data.content;
                document.getElementById('edit-title').value = data.title;
                document.getElementById('edit-content').value = data.content;
            }
        }

        // データの保存（upsert）
        async function savePage() {
            const title = document.getElementById('edit-title').value;
            const content = document.getElementById('edit-content').value;

            const { error } = await sb
                .from('wiki_pages')
                .upsert({ slug, title, content, updated_at: new Date() });

            if (error) alert('エラー: ' + error.message);
            else {
                location.reload();
            }
        }

        function toggleEdit(isEdit) {
            document.getElementById('display-area').style.display = isEdit ? 'none' : 'block';
            document.getElementById('edit-area').style.display = isEdit ? 'block' : 'none';
        }

        loadPage();
    </script>
</body>
</html>
