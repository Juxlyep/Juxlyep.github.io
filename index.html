<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Board | サーバー一覧</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSSは前回と同様のため省略（カードのデザインを保持） */
        :root { --bg-body: #36393f; --bg-card: #202225; --discord-blurple: #5865F2; --text-main: #ffffff; --text-muted: #b9bbbe; --online-color: #3ba55c; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg-body); color: var(--text-main); }
        header { background: #2f3136; padding: 40px 20px; text-align: center; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* カードのスタイル（innerHTMLで生成される要素） */
        .server-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .card-banner { height: 60px; background: var(--discord-blurple); opacity: 0.7; }
        .card-content { padding: 40px 20px 20px; position: relative; }
        .card-icon { position: absolute; top: -30px; left: 20px; width: 60px; height: 60px; border-radius: 18px; border: 4px solid var(--bg-card); }
        .server-name { font-weight: bold; margin-bottom: 5px; }
        .tag { font-size: 0.7rem; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; margin-right: 4px; color: var(--text-muted); }
        .server-stats { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.05); padding: 10px 20px; display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); }
        .online-count::before { content: ""; display: inline-block; width: 8px; height: 8px; background: var(--online-color); border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>

<header>
    <h1>Discord Server Directory</h1>
    <p>Botが取得したデータを表示するテストページ</p>
</header>

<!-- ここにJavaScriptでカードを流し込む -->
<main class="container" id="server-list"></main>

<script>
    // 実際にはここがBotやAPI（fetch）から取得したデータになる
    const serversData = [
        {
            name: "雑談コミュニティ",
            description: "みんなで楽しくお話しましょう！",
            icon: "https://via.placeholder.com/60",
            tags: ["雑談", "初心者"],
            online: 12,
            members: 150
        },
        {
            name: "最強ゲーマー集結",
            description: "FPS中心に活動しているサーバーです。",
            icon: "https://via.placeholder.com/60",
            tags: ["ゲーム", "FPS"],
            online: 85,
            members: 2400
        },
        {
            name: "お勉強部屋",
            description: "24時間作業通話やってます。",
            icon: "https://via.placeholder.com/60",
            tags: ["勉強", "作業"],
            online: 5,
            members: 80
        }
    ];

    const listContainer = document.getElementById('server-list');

    // 取得したデータをinnerHTMLで流し込む処理
    function renderServers(data) {
        listContainer.innerHTML = data.map(server => `
            <div class="server-card">
                <div class="card-banner"></div>
                <div class="card-content">
                    <img src="${server.icon}" class="card-icon" alt="icon">
                    <div class="server-name">${server.name}</div>
                    <div class="tag-list">
                        ${server.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                    </div>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">${server.description}</p>
                </div>
                <div class="server-stats">
                    <span class="online-count">${server.online} Online</span>
                    <span>${server.members} Members</span>
                </div>
            </div>
        `).join('');
    }

    // 実行
    renderServers(serversData);
</script>

</body>
</html>
