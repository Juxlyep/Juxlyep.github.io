<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>StudyEarth - Real-time Observation Hub</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 0.5rem; }
        p { color: #5f6368; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        input { width: 80%; padding: 12px; border: 1px solid #dadce0; border-radius: 4px; font-size: 1.1rem; text-align: center; letter-spacing: 2px; outline: none; }
        input:focus { border: 2px solid #1a73e8; }
        .btn { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 80%; margin-top: 10px; }
        .btn:disabled { background: #ccc; }
        
        /* チャット画面（接続後に表示） */
        #chat-ui { display: none; }
        #log { height: 200px; overflow-y: auto; text-align: left; background: #f8f9fa; padding: 10px; margin-bottom: 10px; font-size: 0.9rem; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container" id="join-ui">
    <h2>観測ノードへの接続</h2>
    <p>割り当てられた10桁の観測地点コードを入力してください。</p>
    <div class="input-group">
        <input type="text" id="room-id" placeholder="xxx-xxxx-xxx" maxlength="12">
    </div>
    <button class="btn" onclick="startNode()">接続を開始する</button>
</div>

<div class="container" id="chat-ui">
    <h3 id="node-title">NODE: 接続中...</h3>
    <div id="log"></div>
    <input type="text" id="msg" placeholder="メッセージを送信..." style="width:70%; letter-spacing: normal;">
    <button onclick="send()" style="width:20%;">送信</button>
</div>

<script>
    let peer, conn;

    function startNode() {
        const rawId = document.getElementById('room-id').value;
        const roomId = "SE-" + rawId.replace(/-/g, ""); // "SE-"を付けて他ユーザーと被り防止

        if (rawId.length < 5) return alert("正しいコードを入力してください");

        // 自分のIDをこのルームIDに設定して起動
        // 先に誰かがいれば「接続」、いなければ「待機」の二段構え
        peer = new Peer(roomId);

        peer.on('open', (id) => {
            document.getElementById('join-ui').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'block';
            document.getElementById('node-title').innerText = "NODE: " + rawId;
            addLog("システム: 観測ノードを確立しました。相手の接続を待っています...");
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                // すでに誰かがそのIDを使っている＝接続を試みる
                connectToNode(roomId);
            } else {
                addLog("エラー: " + err.type);
            }
        });

        // 相手が後から入ってきた場合
        peer.on('connection', (c) => {
            conn = c;
            initConn();
        });
    }

    function connectToNode(roomId) {
        // すでに存在するノードに接続
        peer = new Peer(); // 自分はランダムIDで起動
        peer.on('open', () => {
            conn = peer.connect(roomId);
            initConn();
        });
    }

    function initConn() {
        conn.on('open', () => {
            addLog("システム: ピア接続完了。安全な通信が確立されました。");
        });
        conn.on('data', (data) => {
            addLog("受信: " + data);
        });
    }

    function send() {
        const msg = document.getElementById('msg').value;
        if (conn && conn.open) {
            conn.send(msg);
            addLog("あなた: " + msg);
            document.getElementById('msg').value = "";
        }
    }

    function addLog(text) {
        const log = document.getElementById('log');
        const div = document.createElement('div');
        div.innerText = text;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }
</script>
</body>
</html>
